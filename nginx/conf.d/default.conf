# ExchangeKit — reverse proxy
# Frontend (Next.js) на /, Backend (FastAPI) на /api/.

# Диапазоны IP ЮКасса для webhook (актуализировать по докам ЮКасса).
geo $yookassa_allowed {
    default 0;
    185.71.76.0/27   1;
    185.71.77.0/27   1;
    77.75.153.0/25   1;
    77.75.156.11/32  1;
    77.75.156.35/32  1;
    77.75.154.128/25 1;
    2a02:5180::/32   1;
}

upstream backend_upstream {
    server backend:8000;
}

upstream frontend_upstream {
    server frontend:3000;
}

# Rate-limit зоны
limit_req_zone $binary_remote_addr zone=auth_limit:10m rate=10r/m;
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=60r/m;

server {
    listen 80;
    server_name _;

    # Для боевого домена — раскомментировать редирект на HTTPS:
    # return 301 https://$host$request_uri;

    client_max_body_size 2m;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Webhook ЮКасса — ограничен по IP.
    location = /api/payment/webhook {
        if ($yookassa_allowed = 0) {
            return 403;
        }
        proxy_pass http://backend_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Rate-limit на auth-эндпоинты
    location ~ ^/api/(register|login)$ {
        limit_req zone=auth_limit burst=5 nodelay;
        proxy_pass http://backend_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Остальной API
    location /api/ {
        limit_req zone=api_limit burst=20 nodelay;
        proxy_pass http://backend_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Frontend (Next.js)
    location / {
        proxy_pass http://frontend_upstream;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

