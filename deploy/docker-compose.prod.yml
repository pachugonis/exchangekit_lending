# Production-оверлей. Применяется ВМЕСТЕ с корневым docker-compose.yml:
#
#   docker compose -f docker-compose.yml -f deploy/docker-compose.prod.yml up -d
#
# Делает две вещи:
#   1. Подключает к nginx тома Let's Encrypt (сертификаты + webroot для ACME).
#   2. Добавляет одноразовый сервис certbot (профиль tools, сам не стартует).
#
# Пути сертификатов на хосте: deploy/certbot/conf (gitignored).
services:
  nginx:
    volumes:
      - ./deploy/certbot/conf:/etc/letsencrypt:ro
      - ./deploy/certbot/www:/var/www/certbot:ro

  certbot:
    image: certbot/certbot:latest
    profiles: ["tools"]
    volumes:
      - ./deploy/certbot/conf:/etc/letsencrypt
      - ./deploy/certbot/www:/var/www/certbot
    entrypoint: ""
